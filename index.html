<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Once Upon a Beanstalk</title>
    <!-- Tab Logo / Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-index: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fcfbf7;
            color: #2c3e2b;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid #e6eedb;
        }

        .logo-placeholder {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.2rem;
            color: #1e351f;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .rating {
            color: #ffb800;
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .info-box {
            background: #f4f8f0;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-item {
            margin-bottom: 12px;
            font-size: 1.05rem;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .label {
            font-weight: bold;
            color: #4a6b4c;
        }

        .btn {
            display: inline-block;
            background: #4a6b4c;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .btn:hover {
            background: #385239;
        }

        footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #8a9a86;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">🌱</div>
        <h1>Once Upon a Beanstalk</h1>
        <div class="rating">★ 5.0 Google Rating</div>
        
        <div class="info-box">
            <div class="info-item">
                <span class="label">📞 Phone:</span> (220) 412-6308
            </div>
            <div class="info-item">
                <span class="label">📍 Location:</span> Valdosta, GA
            </div>
            <div class="info-item">
                <span class="label">⏰ Hours:</span> Coming Soon / Call for Info
            </div>
        </div>

        <a href="tel:2204126308" class="btn">Call Us Now</a>
    </div>

    <footer>
        &copy; 2026 Once Upon a Beanstalk. All rights reserved.
    </footer>

    <script>
        // Quick dynamic console confirmation to make sure everything loads clean
        console.log("Once Upon a Beanstalk web layout initialized successfully.");
    </script>
</body>
</html>
